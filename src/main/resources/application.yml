server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: none
        secure: false
        http-only: false

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ChatDB
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  thymeleaf:
    prefix: classpath:/static/
    suffix: .html
    cache: false
    encoding: UTF-8
    mode: HTML

file:
  upload-dir: uploads
  max-file-size: 104857600

mybatis:
  mapper-locations: classpath:templates/*.xml
  type-aliases-package: com.tc.traumchatroom.entity
  configuration:
    map-underscore-to-camel-case: true
