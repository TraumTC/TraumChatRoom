server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ChatDB
    username: root
    password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  thymeleaf:
    prefix: classpath:/static/
    suffix: .html
    cache: false
    encoding: UTF-8
    mode: HTML

mybatis:
  mapper-locations: classpath:templates/*.xml
  type-aliases-package: com.tc.traumchatroom.entity
  configuration:
    map-underscore-to-camel-case: true
