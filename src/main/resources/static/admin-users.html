<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - TraumSpace</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14 sm:h-16">
                <div class="flex items-center">
                    <a href="/space" class="text-lg sm:text-xl font-bold text-gray-900">TraumSpace - 管理后台</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/space" class="text-sm text-gray-600 hover:text-gray-900">返回主页</a>
                    <form action="/logout" method="post">
                        <button type="submit" class="text-sm text-red-600 hover:text-red-800">退出</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col" style="height: calc(100vh - 120px); min-height: 500px;">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center flex-shrink-0">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900">用户管理</h2>
                    <p class="mt-1 text-sm text-gray-500">管理系统用户信息和权限</p>
                </div>
                <button onclick="loadUsers()" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">
                    刷新列表
                </button>
            </div>

            <div id="messageDiv" class="hidden mx-6 mt-4 px-4 py-3 rounded-md text-sm flex-shrink-0"></div>

            <div class="overflow-y-auto flex-1">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户名</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">昵称</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">角色</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-gray-400">加载中...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="p-6 border-b">
                <h3 class="text-lg font-semibold text-gray-900">修改用户信息</h3>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="editUserId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="editUsername" readonly class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 text-gray-500 cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
                    <input type="text" id="editName" maxlength="18" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">角色</label>
                    <select id="editRole" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="ROLE_USER">普通用户</option>
                        <option value="ROLE_ADMIN">管理员</option>
                    </select>
                </div>
                <div class="border-t pt-4 mt-2">
                    <button onclick="showPasswordEdit()" class="text-sm text-blue-600 hover:text-blue-800">修改密码</button>
                </div>
                <div id="passwordEditDiv" class="hidden space-y-3 border-t pt-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                        <input type="password" id="editPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="留空则不修改密码">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
                        <input type="password" id="editConfirmPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请再次输入新密码">
                    </div>
                </div>
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="closeEditModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm hover:bg-gray-50">取消</button>
                <button onclick="saveEdit()" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">保存</button>
            </div>
        </div>
    </div>

    <script>        let users = [];

    window.addEventListener('DOMContentLoaded', loadUsers);

    function showMessage(type, msg) {
        const div = document.getElementById('messageDiv');
        div.className = `mx-6 mt-4 px-4 py-3 rounded-md text-sm ${type === 'success' ? 'bg-green-50 border border-green-200 text-green-700' : 'bg-red-50 border border-red-200 text-red-700'}`;
        div.textContent = msg;
        div.classList.remove('hidden');
        setTimeout(() => div.classList.add('hidden'), 3000);
    }

    function loadUsers() {
        fetch('/api/admin/users')
            .then(res => res.json())
            .then(data => {
                users = data;
                renderTable();
            })
            .catch(() => {
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-400">加载失败</td></tr>';
            });
    }

    function renderTable() {
        const tbody = document.getElementById('userTableBody');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">暂无用户</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(user => {
            const roleText = user.role === 'ROLE_ADMIN' ? '管理员' : (user.role === 'ROLE_GUEST' ? '游客' : '普通用户');
            const roleClass = user.role === 'ROLE_ADMIN' ? 'bg-purple-100 text-purple-800' : (user.role === 'ROLE_GUEST' ? 'bg-yellow-100 text-yellow-800' : 'bg-blue-100 text-blue-800');

            return `                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.username || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.name || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 text-xs font-medium rounded-full ${roleClass}">${roleText}</span>
                        </td>
                         <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <button onclick="openEditModal(${user.id})" class="text-blue-600 hover:text-blue-800 mr-3">编辑</button>
                            <button onclick="deleteUser(${user.id}, '${user.name}')" class="text-red-600 hover:text-red-800">删除</button>
                        </td>
                        </tr>
                `;
        }).join('');
    }

    function openEditModal(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;

        document.getElementById('editUserId').value = user.id;
        document.getElementById('editUsername').value = user.username || '';
        document.getElementById('editName').value = user.name || '';
        document.getElementById('editRole').value = user.role === 'ROLE_ADMIN' ? 'ROLE_ADMIN' : 'ROLE_USER';
        document.getElementById('editPassword').value = '';
        document.getElementById('editConfirmPassword').value = '';
        document.getElementById('passwordEditDiv').classList.add('hidden');
        document.getElementById('editModal').classList.remove('hidden');
    }

    function showPasswordEdit() {
        const div = document.getElementById('passwordEditDiv');
        div.classList.toggle('hidden');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.add('hidden');
    }

    function saveEdit() {
        const id = document.getElementById('editUserId').value;
        const name = document.getElementById('editName').value.trim();
        const role = document.getElementById('editRole').value;
        const password = document.getElementById('editPassword').value;
        const confirmPassword = document.getElementById('editConfirmPassword').value;

        if (!name) {
            alert('昵称不能为空');
            return;
        }

        if (password && password.length < 4) {
            alert('密码长度不能少于4位');
            return;
        }

        if (password && password !== confirmPassword) {
            alert('两次输入的密码不一致');
            return;
        }

        const formData = new FormData();
        formData.append('id', id);
        formData.append('name', name);
        formData.append('role', role);
        if (password) {
            formData.append('password', password);
        }

        fetch('/api/admin/update-user', {
            method: 'POST',
            body: formData
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMessage('success', '修改成功' + (password ? '，密码已重置' : ''));
                    closeEditModal();
                    loadUsers();
                } else {
                    alert(data.message || '修改失败');
                }
            });
    }

    function deleteUser(id, name) {
        if (!confirm(`确定要删除用户 "${name}" 吗？`)) return;

        const formData = new FormData();
        formData.append('id', id);

        fetch('/api/admin/delete-user', {
            method: 'POST',
            body: formData
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMessage('success', '删除成功');
                    loadUsers();
                } else {
                    alert(data.message || '删除失败');
                }
            });
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditModal();
    });
    </script>
</body>
</html>
