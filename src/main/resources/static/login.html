<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraumChatRoom - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-md">
        <div>
            <h2 class="text-center text-3xl font-extrabold text-gray-900">
                TraumChatRoom
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                欢迎回来，请登录您的账户
            </p>
        </div>
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm">
        </div>
        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-md text-sm">
        </div>
        
        <form class="mt-8 space-y-6" action="/login" method="post">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                        用户名
                    </label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="请输入用户名"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        密码
                    </label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="请输入密码"
                    >
                </div>
            </div>

            <div>
                <button
                    type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
                >
                    登录
                </button>
            </div>
        </form>

        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">或者</span>
            </div>
        </div>

        <div class="space-y-3">
            <a href="/ChatRoom"
               class="group relative w-full flex justify-center py-2 px-4 border-2 border-dashed border-yellow-400 text-sm font-medium rounded-md text-yellow-700 bg-yellow-50 hover:bg-yellow-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                以游客身份进入聊天室
            </a>

            <div class="text-center space-y-2">
                <a href="/register" class="font-medium text-blue-600 hover:text-blue-500 transition-colors block">
                    没有账号？去注册 →
                </a>
                <p class="text-xs text-gray-500">
                    游客无需注册，系统会自动为您分配一个专属名称
                </p>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const errorParam = urlParams.get('error');
        const logoutParam = urlParams.get('logout');
        const successParam = urlParams.get('success');

        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const usernameInput = document.getElementById('username');

        // 显示错误信息
        if (errorParam !== null) {
            let errorMsg = '登录失败：用户名或密码错误';

            if (errorParam === 'invalidCredentials') {
                errorMsg = '用户名或密码错误，请重新输入';
            } else if (errorParam === 'userNotFound') {
                errorMsg = '用户不存在，请先注册';
            } else if (errorParam === 'credentialsExpired') {
                errorMsg = '密码已过期，请重新设置密码';
            }
            errorDiv.textContent = errorMsg;
            errorDiv.classList.remove('hidden');

            // 保留用户名（从 session 或 localStorage）
            const savedUsername = localStorage.getItem('lastUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
            }
        }

        // 显示退出成功提示
        if (logoutParam !== null) {
            successDiv.textContent = '您已成功退出登录';
            successDiv.classList.remove('hidden');
        }

        // 显示注册成功提示
        if (successParam === 'registered') {
            successDiv.textContent = '注册成功，请登录';
            successDiv.classList.remove('hidden');
        }

        // 保存用户名到 localStorage
        usernameInput.addEventListener('input', function() {
            if (this.value.trim()) {
                localStorage.setItem('lastUsername', this.value.trim());
            }
        });
    });
    </script>
</body>
</html>
