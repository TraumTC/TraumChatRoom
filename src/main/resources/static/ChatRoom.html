<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraumChatRoom - 聊天室</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-900">TraumChatRoom</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">
                        欢迎，<span id="user" class="font-medium text-gray-900"></span>
                    </span>
                    <form action="/logout" method="post">
                        <button
                            type="submit"
                            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors"
                        >
                            退出登录
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
<!--    在线情况-->

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 在线用户面板 -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-3 border-b bg-gray-50">
                        <h2 class="text-base font-semibold text-gray-900">在线用户 (<span id="onlineCount">0</span>)</h2>
                    </div>
                    <div id="onlineUsersList" class="overflow-y-auto p-2 bg-white" style="max-height: 280px;">
                        <div class="text-center text-gray-400 py-6 text-sm">暂无在线用户</div>
                    </div>
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="lg:col-span-9">
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-3 border-b bg-gray-50">
                        <h2 class="text-base font-semibold text-gray-900">聊天室</h2>
                    </div>

                    <div id="msgArea" class="overflow-y-auto p-4 space-y-2 bg-white" style="height: calc(100vh - 280px); min-height: 400px; max-height: 600px;">
                    </div>

                    <div class="p-4 border-t bg-gray-50">
                        <div class="flex space-x-3">
                            <input
                                    id="content"
                                    type="text"
                                    placeholder="输入消息..."
                                    class="flex-1 appearance-none relative block w-full px-4 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                    onkeypress="if(event.keyCode===13) send()"
                            >
                            <button
                                    onclick="send()"
                                    class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
                            >
                                发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function formatTime(timeStr) {
            if (!timeStr) return '';

            const date = new Date(timeStr);
            if (isNaN(date.getTime())) return timeStr;

            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        fetch('/api/current-user')
            .then(res => res.json())
            .then(user => {
                document.getElementById('user').innerText = user.name;
            })

        const sock = new SockJS('/ws', null, {
            withCredentials: true
        });
        const stomp = Stomp.over(sock);

        stomp.connect({}, function () {
            stomp.subscribe('/topic/messages', function (res) {
                const msg = JSON.parse(res.body);
                appendMessage(msg.sendTime, msg.sender, msg.message);
            });
            stomp.subscribe('/topic/onlineUsers', function (res) {
                const onlineUsers = JSON.parse(res.body);
                updateOnlineUsersList(onlineUsers);
            });

            fetch('/history').then(r => r.json()).then(list => {
                if (!list || list.length === 0) {
                    document.getElementById('msgArea').innerHTML = "<div class='text-center text-gray-400 py-8'>暂无历史记录</div>";
                    return;
                }
                list.forEach(item => {
                    appendMessage(item.sendTime, item.sender, item.message);
                });
            });

            fetch('/api/online-users').then(r => r.json()).then(data => {
                updateOnlineUsersList(data.onlineUsers);
            });
        });

        function updateOnlineUsersList(users) {
            const onlineUsersList = document.getElementById('onlineUsersList');
            const onlineCount = document.getElementById('onlineCount');
            if (!users || users.length === 0) {
                onlineUsersList.innerHTML = "<div class='text-center text-gray-400 py-6 text-sm'>暂无在线用户</div>";
                onlineCount.innerText = '0';
                return;
            }
            onlineCount.innerText = users.length;
            let userListHtml = '';
            users.forEach(username => {
                userListHtml += `
                    <div class="py-1.5 border-b border-gray-100 last:border-0 flex items-center text-sm">
                        <div class="w-2 h-2 bg-green-500 rounded-full mr-2"></div>
                        <span class="text-gray-700">${username}</span>
                    </div>
                `;
            });
            onlineUsersList.innerHTML = userListHtml;
        }
        function appendMessage(timeStr, sender, message) {
            const time = formatTime(timeStr);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item py-2 border-b border-gray-100 last:border-0';

            const timeSpan = document.createElement('span');
            timeSpan.className = 'text-xs text-gray-500';
            timeSpan.textContent = `[${time}]`;

            const senderSpan = document.createElement('span');
            senderSpan.className = 'font-semibold text-blue-600 ml-2';
            senderSpan.textContent = sender;

            const messageSpan = document.createElement('span');
            messageSpan.className = 'text-gray-700 ml-2';
            messageSpan.innerHTML = message;

            msgDiv.appendChild(timeSpan);
            msgDiv.appendChild(senderSpan);
            msgDiv.appendChild(messageSpan);

            document.getElementById('msgArea').appendChild(msgDiv);
            document.getElementById('msgArea').scrollTop = document.getElementById('msgArea').scrollHeight;
        }

        function send() {
            const content = document.getElementById('content').value;
            if (content.trim()) {
                stomp.send('/app/ChatRoom', {}, content);
                document.getElementById('content').value = '';
            }
        }
    </script>
</body>
</html>
