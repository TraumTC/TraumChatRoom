<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraumChatRoom - 聊天室</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/chatroom.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-14 sm:h-16">
            <div class="flex items-center min-w-0 flex-1">
                <h1 class="text-lg sm:text-xl font-bold text-gray-900 truncate">TraumChatRoom</h1>
            </div>
            <div class="flex items-center space-x-2 sm:space-x-4 flex-shrink-0 ml-2">
                    <span class="text-xs sm:text-sm text-gray-600 truncate max-w-[120px] sm:max-w-none">
                        <a href="/profile" id="userLink" class="font-medium text-gray-900 hover:text-blue-600 transition-colors cursor-pointer">
                            <span id="user"></span>
                        </a>
                        <span id="guestBadge" class="hidden ml-1 px-1.5 py-0.5 sm:px-2 sm:py-0.5 text-[10px] sm:text-xs font-medium bg-yellow-100 text-yellow-800 rounded-full">游客</span>
                    </span>
                <div id="authButtons" class="flex items-center flex-shrink-0 gap-1 sm:gap-2">
                    <a href="/admin/users" id="adminBtn" class="hidden inline-flex items-center px-2 py-1.5 sm:px-3 sm:py-2 border border-transparent text-xs sm:text-sm font-medium rounded-md text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-colors whitespace-nowrap">
                        管理后台
                    </a>
                    <a href="/login" id="loginBtn" class="hidden inline-flex items-center px-2 py-1.5 sm:px-4 sm:py-2 border border-transparent text-xs sm:text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors whitespace-nowrap">
                        登录
                    </a>
                    <form action="/logout" method="post" id="logoutForm" class="hidden">
                        <button
                                type="submit"
                                class="inline-flex items-center px-2 py-1.5 sm:px-4 sm:py-2 border border-transparent text-xs sm:text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors whitespace-nowrap"
                        >
                            退出
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="relative">
            <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col" style="height: calc(100vh - 160px); min-height: 500px; max-height: 800px;">
                <div class="p-3 border-b bg-gray-50 flex justify-between items-center flex-shrink-0">
                    <h2 class="text-base font-semibold text-gray-900">
                        聊天室
                        <span class="relative inline-block">
                            <span id="onlineCountBtn" onclick="toggleOnlineUsers()"
                                  class="inline-block ml-2 px-2 py-0.5 text-xs font-medium bg-blue-100 text-blue-700 rounded-full cursor-pointer hover:bg-blue-200 transition-colors select-none">
                                0人在线
                            </span>
                            <div id="onlineUsersPopup" class="hidden absolute top-8 left-0 w-56 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                                <div class="p-3 border-b bg-gray-50 rounded-t-lg">
                                    <h3 class="text-sm font-semibold text-gray-900">在线用户</h3>
                                </div>
                                <div id="onlineUsersList" class="overflow-y-auto p-2 bg-white rounded-b-lg" style="max-height: 300px;">
                                    <div class="text-center text-gray-400 py-6 text-sm">暂无在线用户</div>
                                </div>

                            </div>
                        </span>
                    </h2>
                </div>

                <div id="chatTabs" class="hidden border-b bg-gray-50 flex overflow-x-auto flex-shrink-0">
                    <div id="publicChatTab" class="private-chat-tab active px-4 py-2 cursor-pointer border-r text-sm font-medium text-gray-700" onclick="switchToPublicChat()">
                        💬 公共聊天
                    </div>
                </div>

                <div id="msgArea" class="overflow-y-auto p-4 space-y-2 bg-white flex-1">
                </div>

                <div class="p-2 sm:p-4 border-t bg-gray-50 flex-shrink-0">
                    <div id="privateChatIndicator" class="hidden mb-2 px-3 py-2 bg-blue-50 border border-blue-200 rounded-md">
                        <div class="flex items-center justify-between">
                            <span class="text-xs sm:text-sm text-blue-800 truncate mr-2">
                                🔒 正在与 <span id="privateChatWith" class="font-semibold"></span> 私聊
                            </span>
                            <button onclick="closePrivateChat()" class="text-blue-600 hover:text-blue-800 text-xs sm:text-sm flex-shrink-0">
                                ✕ 关闭
                            </button>
                        </div>
                    </div>
                    <div class="flex space-x-2 sm:space-x-3 items-end">
                        <div class="file-upload-btn flex-shrink-0" id="fileUploadBtn" title="发送图片（仅支持图片）">
                            <span class="text-lg sm:text-xl" id="fileUploadIcon">📎</span>
                            <input type="file" id="fileInput" onchange="handleFileSelect(event)" multiple accept="image/*">
                        </div>
                        <textarea
                                id="content"
                                placeholder="输入消息..."
                                rows="1"
                                class="flex-1 appearance-none relative block w-full px-3 sm:px-4 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm sm:text-sm resize-none overflow-hidden"                                style="min-height: 40px; max-height: 120px;"
                                oninput="autoResize(this)"
                                onkeydown="handleKeyDown(event)"
                        ></textarea>
                        <button
                                onclick="send()"
                                class="inline-flex items-center px-4 sm:px-6 py-2 border border-transparent text-xs sm:text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors self-end flex-shrink-0 whitespace-nowrap"
                        >
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="imagePreviewOverlay" class="image-preview-overlay" onclick="closeImagePreview(event)">
        <div class="image-preview-container">
            <button class="image-preview-close" onclick="closeImagePreview(event)">×</button>
            <img id="imagePreviewImg" src="" alt="图片预览">
            <div class="image-preview-info" id="imagePreviewInfo"></div>
        </div>
    </div>
    <div id="atUserPopup" class="hidden fixed bg-white border border-gray-200 rounded-lg shadow-xl z-50 overflow-hidden" style="min-width: 200px;">
        <div class="p-2 border-b bg-gray-50 rounded-t-lg flex justify-between items-center">
            <span class="text-xs text-gray-500">选择要 @ 的用户</span>
            <button id="atMultiSelectBtn" class="text-xs text-blue-600 hover:text-blue-800 px-2 py-1 rounded" onclick="toggleAtMultiSelect()">多选</button>
        </div>
        <div class="p-2 border-b">
            <input type="text" id="atSearchInput" placeholder="搜索用户..." class="w-full px-3 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-500" oninput="filterAtUsers(this.value)">
        </div>
        <div id="atUserList" class="max-h-60 overflow-y-auto p-1"></div>
        <div id="atMultiSelectActions" class="hidden border-t p-2 bg-gray-50 flex justify-between items-center">
            <span class="text-xs text-gray-600">已选 <span id="atSelectedCount">0</span> 人</span>
            <div class="flex gap-2">
                <button class="text-xs px-3 py-1 bg-gray-200 rounded hover:bg-gray-300" onclick="clearAtSelection()">清空</button>
                <button class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="confirmAtSelection()">确认</button>
            </div>
        </div>
    </div>


</body>
<script src="/js/module/utils.js"></script>
<script src="/js/module/websocket.js"></script>
<script src="/js/module/online-users.js"></script>
<script src="/js/module/private-chat.js"></script>
<script src="/js/module/message.js"></script>
<script src="/js/module/file.js"></script>
<script src="/js/module/mention.js"></script>
<script src="/js/module/context-menu.js"></script>
<script src="/js/chatroom.js"></script>
</html>
