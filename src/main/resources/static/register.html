<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraumChatRoom - 注册</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-md">
        <div>
            <h2 class="text-center text-3xl font-extrabold text-gray-900">
                创建账户
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                加入我们，开始聊天
            </p>
        </div>

        <div th:if="${errorMessage}" class="rounded-md bg-red-50 p-4">
            <div class="flex">
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800" th:text="${errorMessage}">
                    </h3>
                </div>
            </div>
        </div>

        <form class="mt-8 space-y-6" th:action="@{/register}" method="post" onsubmit="return validateForm()">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                        用户名 *
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autofocus
                        maxlength="20"
                        minlength="1"
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="请设置用户名（最多18个字符）"
                        oninput="updateUsernameCount()"
                    >
                    <p class="mt-1 text-xs text-gray-500">
                        用户名长度：<span id="usernameCount">0</span>/18 个字符
                    </p>
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                        昵称 *
                    </label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        maxlength="20"
                        minlength="1"
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="请设置您的昵称（最多18个字符）"
                        oninput="updateNameCount()"
                    >
                    <p class="mt-1 text-xs text-gray-500">
                        昵称长度：<span id="nameCount">0</span>/18 个字符
                    </p>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        密码 *
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="请设置密码"
                    >
                </div>
            </div>

            <div>
                <button
                    type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
                >
                    注册
                </button>
            </div>
        </form>

        <div class="text-center">
            <a href="/login" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                已有帐号？立即登录 →
            </a>
        </div>
    </div>
    <script>
        function updateUsernameCount() {
            const username = document.getElementById('username');
            const count = document.getElementById('usernameCount');
            count.textContent = username.value.length;

            if (username.value.length >= 20) {
                count.classList.add('text-red-600', 'font-semibold');
                count.classList.remove('text-gray-500');
            } else {
                count.classList.remove('text-red-600', 'font-semibold');
                count.classList.add('text-gray-500');
            }
        }

        function updateNameCount() {
            const name = document.getElementById('name');
            const count = document.getElementById('nameCount');
            count.textContent = name.value.length;

            if (name.value.length >= 20) {
                count.classList.add('text-red-600', 'font-semibold');
                count.classList.remove('text-gray-500');
            } else {
                count.classList.remove('text-red-600', 'font-semibold');
                count.classList.add('text-gray-500');
            }
        }

        function validateForm() {
            const username = document.getElementById('username');
            const name = document.getElementById('name');

            if (username.value.length > 20) {
                alert('用户名长度不能超过20个字符！');
                return false;
            }

            if (name.value.length > 20) {
                alert('昵称长度不能超过20个字符！');
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
